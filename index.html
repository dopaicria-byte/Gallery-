<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Galeria Pro - Alberto José</title>
    <style>
        :root { --ios-blue: #007aff; --ios-bg: #f2f2f7; --ios-red: #ff3b30; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { margin: 0; font-family: -apple-system, sans-serif; background: var(--ios-bg); height: 100vh; overflow: hidden; }

        /* SIDEBAR */
        #sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: #fff; z-index: 30000; transition: 0.3s; box-shadow: 5px 0 15px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        #sidebar.open { left: 0; }
        #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 25000; }
        
        .menu-header { padding: 50px 20px 20px; background: var(--ios-bg); font-weight: bold; font-size: 18px; border-bottom: 1px solid #ddd; }
        .menu-item { padding: 15px 20px; border-bottom: 1px solid #f0f0f0; display: flex; align-items: center; gap: 12px; cursor: pointer; color: #333; text-decoration: none; font-size: 15px; }

        /* ICONES SVG (OFFLINE) */
        .icon-svg { width: 20px; height: 20px; fill: currentColor; }

        .creator-info { margin-top: auto; padding: 20px; background: #fafafa; border-top: 1px solid #ddd; }
        .creator-links { display: flex; flex-direction: column; gap: 15px; margin-top: 12px; }
        .creator-links a { text-decoration: none; font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 10px; color: #333; }

        header { padding: 50px 20px 15px; background: #fff; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ddd; }
        .menu-btn { font-size: 26px; background: none; border: none; color: var(--ios-blue); cursor: pointer; }
        
        #content { flex: 1; overflow-y: auto; padding: 15px; height: calc(100vh - 110px); }
        #grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .folder { grid-column: span 1.5; background: #fff; border-radius: 15px; padding: 20px; text-align: center; }
        .photo-card { width: 100%; aspect-ratio: 1; border-radius: 8px; object-fit: cover; }
        
        #lock { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #fff; }
        #lock input { padding: 15px; border-radius: 12px; background: #1c1c1e; color: #fff; border: 1px solid #333; font-size: 24px; text-align: center; width: 260px; margin-bottom: 15px; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 40000; justify-content: center; align-items: center; }
        .modal-box { background: #fff; width: 85%; border-radius: 15px; padding: 25px; text-align: center; }
        .modal-btns { display: flex; flex-direction: column; gap: 8px; margin-top: 15px; }
        .modal-btns button { padding: 14px; border: none; border-radius: 10px; font-weight: bold; font-size: 16px; }
        .btn-blue { background: var(--ios-blue); color: #fff; }
        .btn-red { background: var(--ios-red); color: #fff; }
    </style>
</head>
<body>

<div id="overlay" onclick="toggleMenu()"></div>

<nav id="sidebar">
    <div class="menu-header">Menu Principal</div>
    <div class="menu-item" onclick="mudarTab('albuns'); toggleMenu()">🏠 Início</div>
    <div class="menu-item" onclick="mudarTab('favoritos'); toggleMenu()">⭐ Favoritos</div>
    <div class="menu-item" onclick="mudarTab('lixeira'); toggleMenu()">🗑️ Lixeira</div>
    <div class="menu-item" onclick="prepararTrocaSenha(); toggleMenu()">🔑 Segurança</div>
    
    <div class="creator-info">
        <b>Alberto José</b><br><small>Desenvolvedor</small>
        <div class="creator-links">
            <a href="https://www.facebook.com/profile.php?id=100046460659895" target="_blank">
                <svg class="icon-svg" style="fill:#1877F2" viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
                Facebook
            </a>
            <a href="https://instagram.com/alberto_jose22a" target="_blank">
                <svg class="icon-svg" style="fill:#C13584" viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>
                Instagram
            </a>
        </div>
    </div>
</nav>

<div id="modal" class="modal">
    <div class="modal-box">
        <h3 id="modal-title"></h3>
        <p id="modal-desc" style="color:#666; font-size:14px;"></p>
        <input id="modal-input" type="text" style="display:none">
        <div id="modal-actions" class="modal-btns"></div>
    </div>
</div>

<div id="lock">
    <div style="font-size: 60px; margin-bottom: 20px;">🔒</div>
    <input id="pass-input" type="password" placeholder="Senha" inputmode="numeric">
    <button onclick="verificar()" style="background:var(--ios-blue); color:#fff; border:none; padding:15px 50px; border-radius:30px; font-weight:bold; font-size:16px;">ENTRAR</button>
    <p onclick="recuperarSenha()" style="color:var(--ios-blue); margin-top:20px; text-decoration:underline;">Esqueci a senha</p>
</div>

<header>
    <button class="menu-btn" onclick="toggleMenu()">☰</button>
    <span id="title">Álbuns</span>
    <button id="back" style="display:none; color:var(--ios-blue); background:none; border:none; font-weight:bold;" onclick="voltar()">❮ Voltar</button>
</header>

<div id="content"><div id="grid"></div></div>
<button id="add-btn" onclick="acaoPrincipal()" style="position:fixed; bottom:30px; right:20px; width:65px; height:65px; border-radius:50%; background:var(--ios-blue); color:#fff; border:none; font-size:35px; box-shadow:0 5px 15px rgba(0,0,0,0.2);">＋</button>

<script>
    let abaAtual = 'albuns';
    let albumAberto = null;

    const db = {
        get: (k) => JSON.parse(localStorage.getItem(k) || (k.includes('pass') ? '"1234"' : k.includes('word') ? '"galeria"' : "[]")),
        set: (k, v) => localStorage.setItem(k, JSON.stringify(v))
    };

    function toggleMenu() {
        const s = document.getElementById("sidebar");
        const o = document.getElementById("overlay");
        s.classList.toggle("open");
        o.style.display = s.classList.contains("open") ? "block" : "none";
    }

    function abrirModal(tit, desc, placeholder, botoes) {
        document.getElementById("modal-title").innerText = tit;
        document.getElementById("modal-desc").innerText = desc;
        const inp = document.getElementById("modal-input");
        inp.style.display = placeholder ? "block" : "none";
        inp.placeholder = placeholder || ""; inp.value = "";
        const area = document.getElementById("modal-actions");
        area.innerHTML = "";
        botoes.forEach(b => {
            const btn = document.createElement("button");
            btn.innerText = b.label;
            btn.className = b.cor === 'azul' ? 'btn-blue' : (b.cor === 'vermelho' ? 'btn-red' : '');
            btn.onclick = () => { b.acao(inp.value); if(!b.keepOpen) document.getElementById("modal").style.display="none"; };
            area.appendChild(btn);
        });
        document.getElementById("modal").style.display = "flex";
    }

    function verificar() {
        const v = document.getElementById("pass-input").value;
        if(v === db.get("app_pass")) { document.getElementById("lock").style.display = "none"; render(); }
        else { abrirModal("Senha Errada", "O código inserido não é válido.", "", [{label: "Tentar de novo", cor: "azul", acao:()=>{}}]); }
    }

    function recuperarSenha() {
        abrirModal("Recuperação", "Qual sua palavra secreta?", "Palavra", [{
            label: "Validar", cor: "azul", keepOpen: true, acao: (v) => {
                if(v.toLowerCase() === db.get("recovery_word").toLowerCase()) {
                    abrirModal("Nova Senha", "Defina sua nova senha:", "4 números", [{
                        label: "Salvar", cor: "azul", acao: (n) => { if(n.length >= 4) { db.set("app_pass", n); location.reload(); } }
                    }]);
                } else { alert("Incorreta!"); }
            }
        }]);
    }

    function render() {
        const grid = document.getElementById("grid");
        const title = document.getElementById("title");
        const back = document.getElementById("back");
        grid.innerHTML = "";
        back.style.display = albumAberto ? "block" : "none";
        let albuns = db.get("albuns_db");

        if(albumAberto) {
            title.innerText = albumAberto;
            let p = albuns.find(x => x.nome === albumAberto);
            p.fotos.forEach((img, i) => {
                let el = document.createElement("img"); el.src = img; el.className = "photo-card";
                el.onclick = () => abrirModal("Opções", "O que fazer?", "", [
                    {label: "Favoritar", cor: "azul", acao: () => { let f = db.get("fav_db"); if(!f.includes(img)) f.push(img); db.set("fav_db", f); }},
                    {label: "Apagar", cor: "vermelho", acao: () => { let l = db.get("lixeira_db"); l.push({data: p.fotos.splice(i, 1)[0], origem: albumAberto}); db.set("albuns_db", albuns); db.set("lixeira_db", l); render(); }}
                ]);
                grid.appendChild(el);
            });
        } else {
            title.innerText = abaAtual === 'albuns' ? "Meus Álbuns" : (abaAtual === 'favoritos' ? "Favoritos" : "Lixeira");
            let lista = abaAtual === 'albuns' ? albuns : (abaAtual === 'favoritos' ? db.get("fav_db") : db.get("lixeira_db"));
            lista.forEach((item, i) => {
                let el = document.createElement("div");
                if(abaAtual === 'albuns') {
                    el.className = "folder"; el.innerHTML = `📂<br><b>${item.nome}</b><br><small>${item.fotos.length} itens</small>`;
                    el.onclick = () => { albumAberto = item.nome; render(); };
                } else {
                    let img = document.createElement("img"); img.src = item.data || item; img.className = "photo-card";
                    el.appendChild(img);
                }
                grid.appendChild(el);
            });
        }
    }

    function mudarTab(t) { abaAtual = t; albumAberto = null; render(); }
    function voltar() { albumAberto = null; render(); }

    function acaoPrincipal() {
        if(abaAtual === 'albuns' && !albumAberto) {
            abrirModal("Novo Álbum", "Nome da pasta:", "Ex: Privado", [{ label: "Criar", cor: "azul", acao: (n) => { if(n) { let l = db.get("albuns_db"); l.push({nome: n, fotos: []}); db.set("albuns_db", l); render(); } } }]);
        } else if(albumAberto) {
            let i = document.createElement('input'); i.type = 'file'; i.accept = "image/*"; i.multiple = true;
            i.onchange = e => {
                let l = db.get("albuns_db"); let p = l.find(x => x.nome === albumAberto);
                Array.from(e.target.files).forEach(f => {
                    let r = new FileReader(); r.onload = ev => { p.fotos.push(ev.target.result); db.set("albuns_db", l); render(); }; r.readAsDataURL(f);
                });
            }; i.click();
        }
    }

    function prepararTrocaSenha() {
        abrirModal("Segurança", "Senha atual:", "Senha", [{ label: "OK", cor: "azul", acao: (v) => {
            if(v === db.get("app_pass")) {
                abrirModal("Nova Senha", "Nova senha e palavra secreta:", "Nova Senha", [{ label: "Salvar", cor: "azul", acao: (n) => {
                    let w = prompt("Nova palavra secreta:"); if(n && w) { db.set("app_pass", n); db.set("recovery_word", w); location.reload(); }
                }}]);
            }
        }}]);
    }
</script>
</body>
</html>
